<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>보이(VOY)는 VOTE</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root { --green: #1f7a4d; --green-deep: #155c39; --green-soft: #e8f4ec; --green-line: #bfe0cc; --white: #fff; --ink: #1a1a1a; --yellow: #ffd21f; --red: #e23b2e; --gray: #6b7770; --line: #dfe7e2; --shadow: 0 8px 30px rgba(21,92,57,.12); }
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR'; background: radial-gradient(1200px 600px at 100% -10%, #f3faf5 0%, transparent 60%), radial-gradient(900px 500px at -10% 110%, #eef8f1 0%, transparent 55%), var(--white); color: var(--ink); min-height: 100vh; }
.app { max-width: 900px; margin: 0 auto; padding: 22px 18px 90px; }
.topbar { display: flex; align-items: center; gap: 12px; padding: 10px 4px 18px; }
.logo { font-size: 22px; font-weight: 900; color: var(--green-deep); display: flex; align-items: center; gap: 9px; letter-spacing: -0.5px; }
.logo .dot { width: 30px; height: 30px; border-radius: 9px; background: linear-gradient(135deg, var(--green), var(--green-deep)); display: grid; place-items: center; color: #fff; font-size: 16px; box-shadow: var(--shadow); }
.ev-tag { margin-left: auto; font-size: 13px; color: var(--green-deep); background: var(--green-soft); border: 1px solid var(--green-line); padding: 6px 12px; border-radius: 999px; font-weight: 700; max-width: 55%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: none; }
.card { background: var(--white); border: 1px solid var(--line); border-radius: 20px; padding: 26px 22px; box-shadow: var(--shadow); margin-bottom: 18px; }
.card h1 { font-weight: 900; font-size: 27px; margin: 0 0 6px; color: var(--green-deep); letter-spacing: -0.5px; }
.card h2 { font-weight: 900; font-size: 21px; margin: 0 0 14px; color: var(--ink); letter-spacing: -0.3px; }
.sub { color: var(--gray); font-size: 14px; margin: 0 0 20px; line-height: 1.6; }
label { display: block; font-weight: 700; font-size: 14px; margin: 14px 0 7px; color: var(--ink); }
input[type=text], input[type=password], input[type=number], textarea, select { width: 100%; border: 2px solid var(--line); border-radius: 13px; padding: 13px 15px; font-size: 16px; font-family: inherit; color: var(--ink); background: #fbfdfc; transition: border-color .15s, box-shadow .15s; }
input:focus, textarea:focus, select:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 4px rgba(31,122,77,.12); }
textarea { resize: vertical; min-height: 150px; line-height: 1.7; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: none; border-radius: 13px; padding: 14px 22px; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; transition: transform .08s, filter .15s, box-shadow .15s; width: 100%; }
.btn:active { transform: translateY(1px); }
.btn-green { background: linear-gradient(135deg, var(--green), var(--green-deep)); color: #fff; box-shadow: 0 6px 18px rgba(31,122,77,.3); }
.btn-green:hover { filter: brightness(1.05); }
.btn-ghost { background: var(--green-soft); color: var(--green-deep); border: 1.5px solid var(--green-line); box-shadow: none; }
.btn-sm { padding: 10px 14px; font-size: 14px; width: auto; }
.btn-row { display: flex; gap: 10px; margin-top: 18px; }
.btn-row .btn { flex: 1; }
.choice { display: grid; gap: 14px; }
.choice-btn { text-align: left; border: 2px solid var(--line); border-radius: 18px; background: #fff; padding: 20px; cursor: pointer; transition: border-color .15s, transform .08s; display: flex; gap: 16px; align-items: center; }
.choice-btn:hover { border-color: var(--green); }
.choice-ic { width: 50px; height: 50px; border-radius: 14px; display: grid; place-items: center; font-size: 24px; flex-shrink: 0; background: var(--green-soft); }
.choice-btn .t { font-weight: 900; font-size: 17px; }
.choice-btn .d { color: var(--gray); font-size: 13px; margin-top: 3px; }
.foot { text-align: center; font-size: 11px; color: #b8c4bd; letter-spacing: .4px; padding: 26px 0 8px; font-weight: 500; }
.loading { position: fixed; inset: 0; background: rgba(255,255,255,.8); display: none; place-items: center; z-index: 100; }
.loading.on { display: grid; }
.spinner { width: 46px; height: 46px; border: 5px solid var(--green-soft); border-top-color: var(--green); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#toast { position: fixed; left: 50%; bottom: 80px; transform: translateX(-50%) translateY(20px); background: var(--ink); color: #fff; padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 700; opacity: 0; pointer-events: none; transition: .25s; z-index: 120; box-shadow: var(--shadow); max-width: 88%; text-align: center; }
#toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="loading" id="loading"><div class="spinner"></div></div>
<div id="toast"></div>
<div class="app">
  <div class="topbar">
    <div class="logo"><span class="dot">★</span> 보이(VOY)는 VOTE</div>
    <div class="ev-tag" id="evTag"></div>
  </div>
  <div id="screen"></div>
  <div class="foot">Planning and Production by mujjinhwan</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDIespzZird2IAMIos5TdGtZYxPS5GpmuM",
  authDomain: "voyisvote.firebaseapp.com",
  projectId: "voyisvote",
  storageBucket: "voyisvote.firebasestorage.app",
  messagingSenderId: "377416597184",
  appId: "1:377416597184:web:fcbcd92a63df13e7313725"
};

let db = null;
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  console.log("✓ Firebase");
} catch(e) {
  console.error("Firebase init", e);
}

const _mk = ["NjIwMmV0b3", "ZzaXlvdg=="];
const getMasterPw = () => atob(_mk.join("")).split("").reverse().join("");
const $ = (s) => document.querySelector(s);
const screen = document.getElementById("screen");

let state = { eventId: null, event: null, unsub: null };

function showLoad(b) { document.getElementById("loading").classList.toggle("on", b); }
function toast(msg) { const t = $("#toast"); t.textContent = msg; t.classList.add("on"); setTimeout(() => t.classList.remove("on"), 2200); }
function esc(s) { return (s + "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function renderHome() {
  document.getElementById("evTag").classList.add("hidden");
  screen.innerHTML = `
    <div class="card">
      <h1>안녕하세요 👋</h1>
      <p class="sub">공모전 Voice를 등록하고, QR로 심사자들의 점수를 모아 순위를 매기는 시스템입니다.</p>
      <div class="choice">
        <button class="choice-btn" onclick="goNewEventForm()">
          <div class="choice-ic">✨</div>
          <div>
            <div class="t">새 이벤트 만들기</div>
            <div class="d">이벤트 이름과 4자리 비밀번호를 정합니다</div>
          </div>
        </button>
        <button class="choice-btn" onclick="goOpenEvent()">
          <div class="choice-ic">📂</div>
          <div>
            <div class="t">기존 이벤트 열기</div>
            <div class="d">전에 만든 이벤트를 이어서 진행/결과 확인</div>
          </div>
        </button>
      </div>
      <button class="btn btn-ghost btn-sm" style="margin-top:16px;width:100%;opacity:.7" onclick="adminGate()">🔒 관리자 모드</button>
    </div>
  `;
}

function goNewEventForm() {
  screen.innerHTML = `
    <div class="card">
      <h1>새 이벤트 만들기</h1>
      <p class="sub">이벤트 이름과 비밀번호를 정합니다.</p>
      <label>이벤트 이름</label>
      <input type="text" id="evName" placeholder="예: 2026 상반기 공모전" maxlength="40">
      <label>작성 주체자 이름</label>
      <input type="text" id="evOwner" placeholder="예: 유일한" maxlength="30">
      <label>4자리 비밀번호</label>
      <input type="password" id="evPw" inputmode="numeric" maxlength="4" placeholder="● ● ● ●">
      <label>Voice 개수</label>
      <input type="number" id="voiceCount" min="1" max="100" value="5" inputmode="numeric">
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="renderHome()">뒤로</button>
        <button class="btn btn-green" onclick="createEvent()">만들기 →</button>
      </div>
    </div>
  `;
}

async function doCreateEvent() {
  const name = $("#evName").value.trim();
  const owner = $("#evOwner").value.trim();
  const pw = $("#evPw").value.trim();
  const voiceCount = parseInt($("#voiceCount").value);

  if (name.length < 2) return toast("이벤트 이름을 입력하세요");
  if (owner.length < 1) return toast("작성 주체자 이름을 입력하세요");
  if (!/^\d{4}$/.test(pw)) return toast("비밀번호는 숫자 4자리");
  if (!voiceCount || voiceCount < 1 || voiceCount > 100) return toast("Voice는 1~100개");

  showLoad(true);
  try {
    const id = "ev_" + Date.now().toString(36);
    const works = Array.from({length: voiceCount}, () => ({imgs: [], title: "", text: "", org: "", author: ""}));
    
    await db.collection("events").doc(id).set({
      name, owner, pw, totalWorks: voiceCount, works, phase: "input", judges: 0, currentWork: 0, scores: {}, deepScores: {}
    });

    state.eventId = id;
    showLoad(false);
    enterHub();
  } catch(e) {
    showLoad(false);
    toast("생성 실패");
  }
}

function goOpenEvent() {
  screen.innerHTML = `
    <div class="card">
      <h1>기존 이벤트 열기</h1>
      <div id="evList" style="margin-bottom:20px;"></div>
      <label>이벤트 ID</label>
      <input type="text" id="openId" placeholder="ev_xxxxx">
      <label>비밀번호</label>
      <input type="password" id="openPw" inputmode="numeric" maxlength="4" placeholder="● ● ● ●">
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="renderHome()">뒤로</button>
        <button class="btn btn-green" onclick="doOpenEvent()">열기 →</button>
      </div>
    </div>
  `;
  listEvents();
}

async function listEvents() {
  try {
    const snap = await db.collection("events").get();
    const items = [];
    
    snap.forEach(d => {
      const v = d.data();
      items.push({
        id: d.id,
        name: v.name,
        owner: v.owner,
        n: v.totalWorks,
        phase: v.phase
      });
    });

    const el = document.getElementById("evList");
    
    if (!items.length) {
      el.innerHTML = '<p class="sub">등록된 이벤트가 없습니다</p>';
      return;
    }

    items.reverse();
    const phaseTxt = {input: "입력중", judging: "즉석심사중", deepjudging: "진중히심사중", done: "완료"};
    
    el.innerHTML = '<div style="display:grid;gap:12px;margin-bottom:16px;">' + 
      items.map(it => `
        <button style="text-align:left;border:2px solid var(--line);border-radius:18px;background:#fff;padding:16px;cursor:pointer;transition:border-color .15s;display:block;width:100%;" onclick="document.getElementById('openId').value='${it.id}';document.getElementById('openPw').focus()">
          <div style="font-weight:900;font-size:16px;color:var(--green-deep);">${esc(it.name)}</div>
          <div style="font-size:13px;color:var(--gray);margin-top:6px;">${it.id} · Voice ${it.n}개 · ${phaseTxt[it.phase] || ""}</div>
        </button>
      `).join("") + 
    '</div>';
  } catch(e) {
    console.error(e);
  }
}

async function doOpenEvent() {
  const id = $("#openId").value.trim();
  const pw = $("#openPw").value.trim();

  if (!id) return toast("이벤트 ID를 입력하세요");

  showLoad(true);
  const doc = await db.collection("events").doc(id).get();
  showLoad(false);

  if (!doc.exists) return toast("이벤트를 찾을 수 없습니다");
  if (doc.data().pw !== pw) return toast("비밀번호가 틀립니다");

  state.eventId = id;
  enterHub();
}

async function enterHub() {
  showLoad(true);
  const doc = await db.collection("events").doc(state.eventId).get();
  state.event = doc.data();
  showLoad(false);

  const ev = state.event;
  document.getElementById("evTag").classList.remove("hidden");
  document.getElementById("evTag").textContent = "📋 " + ev.name;

  screen.innerHTML = `
    <div class="card">
      <h1>${esc(ev.name)}</h1>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
        <div style="border:2px solid var(--line);border-radius:18px;background:#fff;padding:22px 16px;text-align:center;cursor:pointer;" onclick="goInput()">
          <div style="font-size:30px;margin-bottom:10px;">📝</div>
          <div style="font-weight:900;font-size:16px;">Voice 입력</div>
          <div style="color:var(--gray);font-size:12px;margin-top:5px;">현재 ${ev.totalWorks}개 등록</div>
        </div>
        <div style="border:2px solid var(--line);border-radius:18px;background:#fff;padding:22px 16px;text-align:center;cursor:pointer;" onclick="goJudge()">
          <div style="font-size:30px;margin-bottom:10px;">📱</div>
          <div style="font-weight:900;font-size:16px;">심사 시작</div>
          <div style="color:var(--gray);font-size:12px;margin-top:5px;">방식선택</div>
        </div>
        <div style="border:2px solid var(--line);border-radius:18px;background:#fff;padding:22px 16px;text-align:center;cursor:pointer;" onclick="goResult()">
          <div style="font-size:30px;margin-bottom:10px;">🏆</div>
          <div style="font-weight:900;font-size:16px;">결과 보기</div>
          <div style="color:var(--gray);font-size:12px;margin-top:5px;">최종 순위</div>
        </div>
      </div>
      <button class="btn btn-ghost" style="margin-top:8px" onclick="renderHome()">← 홈으로</button>
    </div>
  `;
}

let inputIdx = 0;

async function goInput() {
  showLoad(true);
  const doc = await db.collection("events").doc(state.eventId).get();
  state.event = doc.data();
  showLoad(false);
  inputIdx = 0;
  renderInput();
}

function renderInput() {
  const ev = state.event;
  const w = ev.works[inputIdx] || {imgs: [], title: "", text: "", org: "", author: ""};
  const doneCount = ev.works.filter(x => x.text || x.title).length;

  screen.innerHTML = `
    <div class="card">
      <h2>Voice ${inputIdx + 1} / ${ev.totalWorks}</h2>
      <div style="height:9px;background:var(--green-soft);border-radius:99px;margin:6px 0 4px;overflow:hidden;">
        <div style="display:block;height:100%;background:linear-gradient(90deg,var(--yellow),var(--green));width:${(inputIdx)/ev.totalWorks*100}%;"></div>
      </div>
      <label>Voice 제목</label>
      <input type="text" id="wtitle" value="${esc(w.title)}" maxlength="60">
      <label>Voice 글</label>
      <textarea id="wtext">${esc(w.text)}</textarea>
      <label>작성자 소속</label>
      <input type="text" id="worg" value="${esc(w.org)}">
      <label>작성자 이름</label>
      <input type="text" id="wauthor" value="${esc(w.author)}">
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="inputMove(-1)" ${inputIdx === 0 ? "disabled" : ""}>← 이전</button>
        <button class="btn btn-green" onclick="saveWork(${inputIdx < ev.totalWorks - 1 ? 1 : 0})">${inputIdx < ev.totalWorks - 1 ? "저장 후 다음 →" : "저장하고 마치기 ✓"}</button>
      </div>
      <button class="btn btn-ghost btn-sm" style="margin-top:16px" onclick="enterHub()">허브로 돌아가기</button>
    </div>
  `;
}

function inputMove(d) {
  inputIdx = Math.max(0, Math.min(state.event.totalWorks - 1, inputIdx + d));
  renderInput();
}

async function saveWork(goNext) {
  const text = $("#wtext").value.trim();
  const title = $("#wtitle").value.trim();
  if (!text && !title) return toast("제목 또는 글을 입력하세요");

  showLoad(true);
  try {
    const works = [...state.event.works];
    works[inputIdx] = {
      imgs: works[inputIdx].imgs,
      title,
      text,
      org: $("#worg").value.trim(),
      author: $("#wauthor").value.trim()
    };
    
    await db.collection("events").doc(state.eventId).update({works});
    state.event.works = works;
    showLoad(false);

    if (goNext && inputIdx < state.event.totalWorks - 1) {
      inputIdx++;
      renderInput();
      toast("저장됨");
    } else {
      toast("모든 Voice 저장 완료");
      enterHub();
    }
  } catch(e) {
    showLoad(false);
    toast("저장 실패");
  }
}

function goJudge() {
  const ev = state.event;
  const written = ev.works?.filter(x => x.text || x.title).length || 0;
  
  if (written === 0) {
    return toast("먼저 Voice를 입력하세요");
  }

  screen.innerHTML = `
    <div class="card">
      <h1>심사 방식을 선택하세요</h1>
      <div class="choice">
        <button class="choice-btn" onclick="goInstantJudge()">
          <div class="choice-ic">⚡</div>
          <div>
            <div class="t">즉석 심사하기</div>
            <div class="d">진행자가 실시간으로 Voice를 하나씩 진행</div>
          </div>
        </button>
        <button class="choice-btn" onclick="goDeepJudge()">
          <div class="choice-ic">🎯</div>
          <div>
            <div class="t">진중히 심사하기</div>
            <div class="d">심사위원들이 자유로운 속도로 심사 (며칠 후 완료 OK)</div>
          </div>
        </button>
      </div>
      <button class="btn btn-ghost" style="margin-top:14px" onclick="enterHub()">뒤로</button>
    </div>
  `;
}

async function goInstantJudge() {
  const ev = state.event;
  if (!ev.works.filter(x => x.text || x.title).length) {
    return toast("먼저 Voice를 입력하세요");
  }

  screen.innerHTML = `
    <div class="card">
      <h1>심사자 인원 설정</h1>
      <label>심사자 수</label>
      <input type="number" id="jcount" min="1" max="50" value="2" inputmode="numeric">
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="goJudge()">뒤로</button>
        <button class="btn btn-green" onclick="startInstantJudge()">QR 생성 →</button>
      </div>
    </div>
  `;
}

async function startInstantJudge() {
  const j = parseInt($("#jcount").value);
  if (!j || j < 1 || j > 50) return toast("1~50 사이로 입력");

  showLoad(true);
  await db.collection("events").doc(state.eventId).update({
    judges: j,
    phase: "judging",
    currentWork: 0,
    assignedCount: 0
  });
  showLoad(false);
  
  toast("심사 모드 시작!");
  enterHub();
}

async function goDeepJudge() {
  const ev = state.event;
  if (!ev.works.filter(x => x.text || x.title).length) {
    return toast("먼저 Voice를 입력하세요");
  }

  screen.innerHTML = `
    <div class="card">
      <h1>진중히 심사하기 설정</h1>
      <p class="sub">심사위원들이 자유로운 속도로 심사합니다</p>
      <label>심사위원 수</label>
      <input type="number" id="deejcount" min="1" max="50" value="2" inputmode="numeric">
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="goJudge()">뒤로</button>
        <button class="btn btn-green" onclick="startDeepJudge()">QR 생성 →</button>
      </div>
    </div>
  `;
}

async function startDeepJudge() {
  const j = parseInt($("#deejcount").value);
  if (!j || j < 1 || j > 50) return toast("1~50 사이로 입력");

  showLoad(true);
  const deepScores = {};
  state.event.works.forEach((_, i) => {
    deepScores[i] = {};
  });

  await db.collection("events").doc(state.eventId).update({
    phase: "deepjudging",
    deepScores,
    deepJudgeCount: 0
  });

  const doc = await db.collection("events").doc(state.eventId).get();
  state.event = doc.data();
  showLoad(false);
  showDeepQR();
}

function showDeepQR() {
  const params = new URLSearchParams(location.search);
  const baseUrl = location.origin + location.pathname;
  const deepUrl = baseUrl + "?ev=" + state.eventId + "&role=judge&type=deep";

  screen.innerHTML = `
    <div class="card">
      <h1>진중히 심사 QR</h1>
      <p class="sub">심사위원들은 아래 QR을 찍어 입장합니다. 자신의 속도대로 심사할 수 있어요.</p>
      <div style="text-align:center;padding:8px 0;margin:20px 0;">
        <div id="qrcode2" style="display:inline-block;background:#fff;padding:16px;border-radius:18px;border:2px solid var(--green-line);box-shadow:var(--shadow);"></div>
      </div>
      <div style="margin-top:12px;font-size:13px;color:var(--gray);word-break:break-all;background:var(--green-soft);padding:10px 12px;border-radius:10px;">${deepUrl}</div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="enterHub()">허브</button>
        <button class="btn btn-green" onclick="hostDeepDashboard()">진행자 대시보드 →</button>
      </div>
    </div>
  `;

  new QRCode(document.getElementById("qrcode2"), {
    text: deepUrl,
    width: 210,
    height: 210,
    colorDark: "#155c39",
    colorLight: "#ffffff"
  });
}

function hostDeepDashboard() {
  if (state.unsub) state.unsub();

  state.unsub = db.collection("events").doc(state.eventId).onSnapshot(snap => {
    if (!snap.exists()) return;
    state.event = snap.data();
    renderDeepDashboard();
  });
}

function renderDeepDashboard() {
  const ev = state.event;
  const deepScores = ev.deepScores || {};
  const judgeStats = {};

  Object.keys(deepScores).forEach(vIdx => {
    Object.keys(deepScores[vIdx]).forEach(jId => {
      if (!judgeStats[jId]) judgeStats[jId] = {completed: 0, total: ev.totalWorks};
      judgeStats[jId].completed++;
    });
  });

  const statusItems = Object.entries(judgeStats).map(([jId, stats]) => `
    <div style="padding:12px;background:var(--green-soft);border:1px solid var(--green-line);border-radius:12px;">
      <div style="font-weight:700;font-size:15px;color:var(--green-deep);margin-bottom:6px;">심사위원 ${jId}</div>
      <div style="display:flex;gap:10px;align-items:center;">
        <div style="flex:1;height:24px;background:#fff;border:1px solid var(--green-line);border-radius:8px;overflow:hidden;">
          <div style="height:100%;background:linear-gradient(90deg,var(--yellow),var(--green));width:${stats.completed/stats.total*100}%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;">${stats.completed}/${stats.total}</div>
        </div>
        <div style="min-width:50px;text-align:right;font-weight:700;color:var(--green-deep);">${Math.round(stats.completed/stats.total*100)}%</div>
      </div>
    </div>
  `).join("");

  screen.innerHTML = `
    <div class="card">
      <h1>진행자 대시보드</h1>
      <p class="sub">심사위원들의 완료 상황을 확인할 수 있습니다</p>
      <div style="display:flex;flex-direction:column;gap:12px;margin:16px 0;">
        ${statusItems || '<p class="sub" style="text-align:center">아직 심사위원이 접속하지 않았습니다</p>'}
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="location.reload()">새로고침 🔄</button>
        <button class="btn btn-green" onclick="finishDeepJudge()">심사 종료 · 결과 보기 🏆</button>
      </div>
      <button class="btn btn-ghost btn-sm" style="margin-top:14px" onclick="enterHub()">허브로</button>
    </div>
  `;
}

async function finishDeepJudge() {
  if (state.unsub) state.unsub();
  
  await db.collection("events").doc(state.eventId).update({
    phase: "done"
  });

  const doc = await db.collection("events").doc(state.eventId).get();
  state.event = doc.data();
  goResult();
}

function goResult() {
  const ev = state.event;
  const rows = [];

  ev.works.forEach((w, i) => {
    if (w.text || w.title) {
      let total = 0, judged = 0;
      
      const instantScores = ev.scores && ev.scores[i] ? ev.scores[i] : {};
      const deepScores = ev.deepScores && ev.deepScores[i] ? ev.deepScores[i] : {};
      
      const allScores = {...instantScores, ...deepScores};
      
      Object.values(allScores).forEach(score => {
        if (typeof score === "number") {
          total += score;
          judged++;
        }
      });

      if (total > 0 || judged > 0) {
        rows.push({i, w, total, judged});
      }
    }
  });

  rows.sort((a, b) => b.total - a.total);

  screen.innerHTML = `
    <div class="card">
      <h1>🏆 최종 순위</h1>
      ${rows.length ? rows.map((r, rk) => `
        <div style="display:flex;gap:14px;padding:16px;border-radius:16px;margin-bottom:11px;border:1px solid var(--line);background:${rk === 0 ? "linear-gradient(135deg,#fffdf2,#fff6d0)" : rk === 1 ? "#f7faf8" : "#fbfdfc"};">
          <div style="font-size:26px;width:46px;height:46px;border-radius:50%;display:grid;place-items:center;flex-shrink:0;color:#fff;font-weight:900;background:${rk === 0 ? "var(--yellow);color:var(--ink)" : rk === 1 ? "#9fb3a8" : "#cd9b6a"};">${rk < 3 ? ["🥇", "🥈", "🥉"][rk] : rk + 1}</div>
          <div style="flex:1;">
            <div style="font-weight:900;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(r.w.title || "Voice " + (r.i + 1))}</div>
            <div style="font-size:12.5px;color:var(--gray);font-weight:700;margin-top:2px;">${esc(r.w.author || "이름 미입력")}</div>
          </div>
          <div style="font-size:24px;font-weight:900;color:var(--green-deep);text-align:right;">
            ${r.total}<br><small style="font-size:12px;color:var(--gray);display:block;">${r.judged}명</small>
          </div>
        </div>
      `).join("") : "<p class='sub'>아직 점수가 없습니다</p>"}
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="enterHub()">허브로</button>
        <button class="btn btn-green" onclick="renderHome()">홈으로</button>
      </div>
    </div>
  `;
}

let adminUnlocked = false;

function adminGate() {
  if (adminUnlocked) {
    adminPanel();
    return;
  }

  screen.innerHTML = `
    <div class="card">
      <h1>🔒 관리자 모드</h1>
      <label>마스터 비밀번호</label>
      <input type="password" id="masterPw" placeholder="비밀번호">
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="renderHome()">뒤로</button>
        <button class="btn btn-dark" onclick="adminUnlock()">입장 →</button>
      </div>
    </div>
  `;
}

function adminUnlock() {
  const pw = $("#masterPw").value;
  if (pw !== getMasterPw()) return toast("비밀번호가 틀립니다");
  
  adminUnlocked = true;
  adminPanel();
}

async function adminPanel() {
  document.getElementById("evTag").classList.add("hidden");
  showLoad(true);

  let items = [];
  try {
    const snap = await db.collection("events").get();
    snap.forEach(d => {
      const v = d.data();
      items.push({id: d.id, name: v.name, n: v.totalWorks});
    });
  } catch(e) {}

  showLoad(false);
  items.reverse();

  screen.innerHTML = `
    <div class="card">
      <h1>전체 이벤트 관리</h1>
      <p class="sub">총 <b>${items.length}</b>개 이벤트</p>
      ${items.length ? items.map(it => `
        <div style="display:flex;gap:14px;padding:16px;border:1px solid var(--line);border-radius:16px;margin-bottom:11px;align-items:center;">
          <div style="flex:1;">
            <div style="font-weight:900;font-size:15px;">${esc(it.name)}</div>
            <div style="font-size:12px;color:var(--gray);margin-top:2px;">${it.id} · Voice ${it.n}개</div>
          </div>
          <button class="btn btn-red btn-sm" onclick="adminDelete('${it.id}', '${esc(it.name).replace(/'/g, "")}')">삭제</button>
        </div>
      `).join("") : "<p class='sub'>이벤트가 없습니다</p>"}
      <button class="btn btn-ghost" style="margin-top:14px" onclick="renderHome()">← 홈으로</button>
    </div>
  `;
}

async function adminDelete(id, name) {
  if (!confirm(name + " 이벤트를 삭제할까요?")) return;

  showLoad(true);
  try {
    await db.collection("events").doc(id).delete();
    showLoad(false);
    toast("삭제됨");
    adminPanel();
  } catch(e) {
    showLoad(false);
    toast("삭제 실패");
  }
}

renderHome();

const params = new URLSearchParams(location.search);
if (params.get("ev") && params.get("role") === "judge") {
  showLoad(true);
  
  if (params.get("type") === "deep") {
    joinAsDeepJudge(params.get("ev"));
  } else {
    joinAsJudge(params.get("ev"));
  }
}

async function joinAsJudge(eventId) {
  const doc = await db.collection("events").doc(eventId).get();
  if (!doc.exists) {
    showLoad(false);
    screen.innerHTML = '<div class="card"><h1>이벤트 없음</h1></div>';
    return;
  }

  state.eventId = eventId;
  state.event = doc.data();

  if (state.unsub) state.unsub();
  state.unsub = db.collection("events").doc(eventId).onSnapshot(snap => {
    if (!snap.exists()) return;
    state.event = snap.data();
    renderJudgeScreen();
  });
}

function renderJudgeScreen() {
  const ev = state.event;
  if (ev.phase !== "judging") {
    showLoad(false);
    screen.innerHTML = '<div class="card"><h1>심사가 종료되었습니다</h1></div>';
    return;
  }

  showLoad(false);

  const cur = ev.currentWork;
  const w = ev.works[cur];

  if (!w || (!w.text && !w.title)) {
    screen.innerHTML = '<div class="card center"><h1>⏳</h1><p class="sub">진행자를 기다리는 중...</p></div>';
    return;
  }

  screen.innerHTML = `
    <div class="card">
      <h2>Voice ${cur + 1}/${ev.totalWorks}</h2>
      <p style="font-size:18px;font-weight:700;color:var(--green-deep);">${esc(w.title || "제목 없음")}</p>
      <textarea readonly style="background:#f5f5f5;color:var(--gray);">${w.text || "(내용 없음)"}</textarea>
      <label>평가 (1-10)</label>
      <input type="number" id="myScore" min="1" max="10" placeholder="점수를 입력하세요">
      <button class="btn btn-green" onclick="submitJudgeScore()">평가 제출 ✓</button>
    </div>
  `;
}

async function submitJudgeScore() {
  const score = parseInt($("#myScore").value);
  if (!score || score < 1 || score > 10) return toast("1-10 사이의 점수를 입력하세요");

  showLoad(true);
  const cur = state.event.currentWork;
  const judgeId = localStorage.getItem("judgeId_" + state.eventId) || "judge_" + Date.now();
  
  localStorage.setItem("judgeId_" + state.eventId, judgeId);

  const scores = state.event.scores || {};
  if (!scores[cur]) scores[cur] = {};
  scores[cur][judgeId] = score;

  try {
    await db.collection("events").doc(state.eventId).update({scores});
    showLoad(false);
    toast("제출됨");
  } catch(e) {
    showLoad(false);
    toast("실패");
  }
}

async function joinAsDeepJudge(eventId) {
  const doc = await db.collection("events").doc(eventId).get();
  if (!doc.exists) {
    showLoad(false);
    screen.innerHTML = '<div class="card"><h1>이벤트 없음</h1></div>';
    return;
  }

  state.eventId = eventId;
  state.event = doc.data();
  
  const judgeId = "judge_" + Math.random().toString(36).slice(2, 8);
  localStorage.setItem("judgeId_" + eventId, judgeId);

  showLoad(false);
  renderDeepJudgeHome();
}

function renderDeepJudgeHome() {
  const ev = state.event;
  const deepScores = ev.deepScores || {};
  const judgeId = localStorage.getItem("judgeId_" + state.eventId);
  const completed = Object.keys(deepScores).filter(vIdx => deepScores[vIdx][judgeId]).length;

  screen.innerHTML = `
    <div class="card">
      <h1>Voice 선택</h1>
      <p class="sub">심사할 Voice를 선택하세요</p>
      <div style="font-size:40px;font-weight:900;color:var(--green-deep);text-align:center;letter-spacing:-1px;margin:16px 0;">
        ${completed} <small style="font-size:18px;color:var(--gray);">/ ${ev.totalWorks}</small>
      </div>
      <div style="height:9px;background:var(--green-soft);border-radius:99px;margin:6px 0 14px;overflow:hidden;">
        <div style="display:block;height:100%;background:linear-gradient(90deg,var(--yellow),var(--green));width:${completed/ev.totalWorks*100}%;"></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(60px,1fr));gap:10px;margin:20px 0;">
        ${ev.works.map((w, i) => {
          const done = deepScores[i] && deepScores[i][judgeId];
          return `<button class="btn ${done ? "btn-green" : "btn-yellow"}" onclick="deepJudgeVoice(${i})" style="height:50px;font-size:14px;">${i+1}${done ? " ✓" : ""}</button>`;
        }).join("")}
      </div>
      <button class="btn btn-ghost btn-sm" style="margin-top:14px" onclick="renderHome()">← 홈</button>
    </div>
  `;
}

async function deepJudgeVoice(vIdx) {
  showLoad(true);
  const doc = await db.collection("events").doc(state.eventId).get();
  state.event = doc.data();
  showLoad(false);

  const w = state.event.works[vIdx];
  if (!w || (!w.text && !w.title)) {
    return toast("입력되지 않은 Voice입니다");
  }

  const judgeId = localStorage.getItem("judgeId_" + state.eventId);
  const deepScores = state.event.deepScores || {};
  const myScore = deepScores[vIdx] && deepScores[vIdx][judgeId] ? deepScores[vIdx][judgeId] : "";

  screen.innerHTML = `
    <div class="card">
      <h2>Voice ${vIdx + 1}/${state.event.totalWorks}</h2>
      <p style="font-size:18px;font-weight:700;color:var(--green-deep);">${esc(w.title || "제목")}</p>
      <textarea readonly style="background:#f5f5f5;color:var(--gray);">${w.text || "(내용 없음)"}</textarea>
      <label>평가 (1-10)</label>
      <input type="number" id="deepScore" min="1" max="10" value="${myScore}" placeholder="점수를 입력하세요">
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="renderDeepJudgeHome()">← 돌아가기</button>
        <button class="btn btn-green" onclick="submitDeepScore(${vIdx})">평가 ${myScore ? "수정" : "제출"} ✓</button>
      </div>
    </div>
  `;
}

async function submitDeepScore(vIdx) {
  const score = parseInt($("#deepScore").value);
  if (!score || score < 1 || score > 10) return toast("1-10 사이의 점수를 입력하세요");

  showLoad(true);
  const judgeId = localStorage.getItem("judgeId_" + state.eventId);

  const deepScores = state.event.deepScores || {};
  if (!deepScores[vIdx]) deepScores[vIdx] = {};
  deepScores[vIdx][judgeId] = score;

  try {
    await db.collection("events").doc(state.eventId).update({deepScores});
    showLoad(false);
    toast("제출됨");
    renderDeepJudgeHome();
  } catch(e) {
    showLoad(false);
    toast("실패");
  }
}
</script>
</body>
</html>
