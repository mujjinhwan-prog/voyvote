.rank-imgs img{width:100%;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--line);}
</style>

r"><i style="width:'+(ev.judges?done/ev.judges*100:0)+'%"></i></div><div class="btn-row"><button class="btn btn-ghost" onclick="window.__hostInstantMove(-1)" '+(cur===0?"disabled":"")+">← 이전</button>"+(cur<ev.totalWorks-1?'<button class="btn btn-green" onclick="window.__hostInstantMove(1)">다음 →</button>':'<button class="btn btn-red" onclick="window.__finishInstantJudge()">종료 🏆</button>')+"</div><button class="btn btn-ghost btn-sm" style="margin-top:14px" onclick="window.__hub()">허브</button></div>";}async function hostInstantMove(d){const ev=STATE.event;let nx=ev.currentWork+d;nx=Math.max(0,Math.min(ev.totalWorks-1,nx));await evRef(STATE.eventId).update({currentWork:nx});}async function finishInstantJudge(){await evRef(STATE.eventId).update({phase:"done"});if(STATE.unsub)STATE.unsub();goResult();}async function joinAsJudge(eventId){if(!guardFb())return;showLoad(true);const ev=await loadEvent(eventId);if(!ev){showLoad(false);screen.innerHTML='<div class="card center"><div class="big-emoji">😵</div><h2>이벤트 없음</h2></div>';return;}const remembered=recallJudge(eventId);if(remembered){showLoad(false);startInstantJudgeWatch(eventId,parseInt(remembered));return;}try{const assigned=await db.runTransaction(async tx=>{const snap=await tx.get(evRef(eventId));if(!snap.exists())throw new Error("없음");const d=snap.data();const used=d.assignedCount||0;const next=used+1;if(next>d.judges)return-1;tx.update(evRef(eventId),{assignedCount:next});return next;});showLoad(false);if(assigned===-1){screen.innerHTML='<div class="card center"><div class="big-emoji">🙅</div><h1>정원 가득</h1></div>';return;}rememberJudge(eventId,assigned);screen.innerHTML='<div class="card center"><div class="big-emoji">🎫</div><h1>심사자 '+assigned+'번</h1><p class="sub">배정되었습니다</p><button class="btn btn-green" onclick="window.__startInstantJudgeWatch('+assigned+')">대기 →</button></div>';}catch(e){showLoad(false);}}function startInstantJudgeWatch(assigned){if(!assigned)assigned=recallJudge(STATE.eventId);STATE.eventId=params.get("ev");if(STATE.unsub)STATE.unsub();STATE.unsub=evRef(STATE.eventId).onSnapshot(snap=>{if(!snap.exists())return;STATE.event=snap.data();renderInstantJudge();});}function renderInstantJudge(){const ev=STATE.event;const judgeNo=recallJudge(STATE.eventId);if(ev.phase==="done"){screen.innerHTML='<div class="card center"><div class="big-emoji">🎉</div><h1>종료됨</h1></div>';return;}const cur=ev.currentWork;const w=ev.works[cur];const sc=ev.scores&&ev.scores[cur]&&ev.scores[cur][judgeNo]||null;myScores=sc?{...sc}:{};if(!isWritten(w)){screen.innerHTML='<div class="card center"><div class="big-emoji">⏳</div><h2>기다리는 중</h2></div>';return;}if(sc){screen.innerHTML='<div class="card center"><div class="big-emoji">✅</div><h1>완료됨</h1><button class="btn btn-ghost btn-sm" onclick="window.__editScore()">수정</button></div>';return;}paintInstantJudgeForm(w,cur,judgeNo);}let myScores={};function paintInstantJudgeForm(w,cur,judgeNo){const ev=STATE.event;if(w.imgs&&!imgCache[cur]){imgCache[cur]=[];w.imgs.forEach((img,i)=>{loadImg(STATE.eventId,cur,i+1).then(d=>{if(d)imgCache[cur][i]=d;});});}const curImgs=imgCache[cur]||[];screen.innerHTML='<div class="card"><div class="judge-imgs">'+curImgs.map(img=>'<img class="judge-img" src="'+img+'">').join("")+'</div><h2 style="text-align:center">'+esc(w.title||"제목")+'</h2><div class="crit" id="crit">'+getCriteria().map(c=>'<div class="crit-row"><div class="crit-head"><span class="crit-name">'+c.name+'</span><span class="crit-val" id="v_'+c.key+'">-<b>/10</b></span></div><div class="scale" data-key="'+c.key+'">'+Array.from({length:10},(_,i)=>'<button data-v="'+(i+1)+'" onclick="window.__pick(\''+c.key+"',"+i+1+')">'+i+1+'</button>').join("")+'</div></div>').join("")+'</div><button class="btn btn-green" style="margin-top:18px" onclick="window.__submitScore('+cur+','+judgeNo+')">제출 ✓</button></div>';Object.keys(myScores).forEach(k=>pick(k,myScores[k],true));}function pick(key,v){myScores[key]=v;const row=document.querySelector('.scale[data-key="'+key+'"]');if(row){[...row.children].forEach(b=>{const bv=+b.dataset.v;b.classList.toggle("on",bv<=v);});}const vEl=$("#v_"+key);if(vEl)vEl.innerHTML=v+'<b>/10</b>';}async function submitScore(cur,judgeNo){for(const c of getCriteria()){if(!myScores[c.key])return toast(c.name+' 미선택');}showLoad(true);try{const ev=await loadEvent(STATE.eventId);const scores=ev.scores||{};if(!scores[cur])scores[cur]={};scores[cur][judgeNo]={...myScores,t:Date.now()};await evRef(STATE.eventId).update({scores});showLoad(false);toast("제출됨 ✓");}catch(e){showLoad(false);toast("실패");}}function editScore(){const ev=STATE.event;const judgeNo=recallJudge(STATE.eventId);const cur=ev.currentWork;myScores={...ev.scores[cur][judgeNo]||{}};paintInstantJudgeForm(ev.works[cur],cur,judgeNo);}async function goDeepJudge(){STATE.event=await loadEvent(STATE.eventId);screen.innerHTML='<div class="card"><h1>진중히 심사</h1><label class="fl">심사자 수</label><input type="number" id="deejcount" min="1" max="50" value="2"><div class="btn-row"><button class="btn btn-ghost" onclick="window.__goJudge()">뒤로</button><button class="btn btn-green" onclick="window.__startDeepJudge()">QR 생성 →</button></div></div>';}async function startDeepJudge(){const j=parseInt($("#deejcount").value);if(!j||j<1||j>50)return toast("오류");showLoad(true);const deepScores={};STATE.event.works.forEach((_,i)=>{deepScores[i]={};});await evRef(STATE.eventId).update({phase:"deepjudging",deepScores,deepJudgeCount:0});STATE.event=await loadEvent(STATE.eventId);showLoad(false);showDeepQR();}function deepJudgeUrl(){return baseUrl+"?ev="+STATE.eventId+"&role=judge&type=deep";}function showDeepQR(){screen.innerHTML='<div class="card qr-wrap"><h1>진중히 심사 QR</h1><div class="qr-box" id="qrcode2"></div><div class="qr-url">'+deepJudgeUrl()+'</div><div class="btn-row"><button class="btn btn-ghost" onclick="window.__hub()">허브</button><button class="btn btn-green" onclick="window.__hostDeepDashboard()">대시보드 →</button></div></div>';new QRCode($("#qrcode2"),{text:deepJudgeUrl(),width:210,height:210,colorDark:"#155c39",colorLight:"#ffffff"});}function hostDeepDashboard(){if(STATE.unsub)STATE.unsub();STATE.unsub=evRef(STATE.eventId).onSnapshot(snap=>{if(!snap.exists())return;STATE.event=snap.data();renderDeepDashboard();});}function renderDeepDashboard(){const ev=STATE.event;const deepScores=ev.deepScores||{};const judgeStats={};Object.keys(deepScores).forEach(vIdx=>{Object.keys(deepScores[vIdx]).forEach(jId=>{if(!judgeStats[jId])judgeStats[jId]={completed:0,total:ev.totalWorks};judgeStats[jId].completed++;});});const statusItems=Object.entries(judgeStats).map(([jId,stats]=>'<div class="judge-status-item"><div class="judge-status-name">심사자 '+jId+'</div><div class="judge-progress"><div class="judge-progress-bar"><div class="fill" style="width:'+stats.completed/stats.total*100+'%">'+stats.completed+'/'+stats.total+'</div></div></div></div>').join("");screen.innerHTML='<div class="card"><h1>진행상황</h1><div class="judge-status-grid">'+statusItems+'</div><div class="btn-row"><button class="btn btn-ghost" onclick="location.reload()">새로고침</button><button class="btn btn-green" onclick="window.__finishDeepJudge()">종료 🏆</button></div><button class="btn btn-ghost btn-sm" style="margin-top:14px" onclick="window.__hub()">허브</button></div>';}async function finishDeepJudge(){await evRef(STATE.eventId).update({phase:"done"});if(STATE.unsub)STATE.unsub();goResult();}async function joinAsDeepJudge(eventId){if(!guardFb())return;showLoad(true);const ev=await loadEvent(eventId);if(!ev){showLoad(false);return;}const remembered=recallJudge(eventId);if(remembered){showLoad(false);startDeepJudgeScreen(eventId,parseInt(remembered));return;}try{const assigned=await db.runTransaction(async tx=>{const snap=await tx.get(evRef(eventId));if(!snap.exists())throw new Error("없음");const d=snap.data();const used=d.deepJudgeCount||0;const next=used+1;tx.update(evRef(eventId),{deepJudgeCount:next});return next;});showLoad(false);rememberJudge(eventId,assigned);screen.innerHTML='<div class="card center"><div class="big-emoji">🎫</div><h1>심사자 '+assigned+'번</h1><button class="btn btn-green" onclick="window.__startDeepJudgeScreen('+assigned+')">시작 →</button></div>';}catch(e){showLoad(false);}}function startDeepJudgeScreen(assigned){STATE.eventId=params.get("ev");if(STATE.unsub)STATE.unsub();STATE.unsub=evRef(STATE.eventId).onSnapshot(snap=>{if(!snap.exists())return;STATE.event=snap.data();renderDeepJudgeHome(assigned);});}function renderDeepJudgeHome(judgeNo){const ev=STATE.event;const deepScores=ev.deepScores||{};const completed=Object.keys(deepScores).filter(vIdx=>deepScores[vIdx][judgeNo]).length;screen.innerHTML='<div class="card"><h1>Voice 선택</h1><div class="counter-big">'+completed+' <small>/ '+ev.totalWorks+'</small></div><div class="pbar"><i style="width:'+completed/ev.totalWorks*100+'%"></i></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:10px;margin:20px 0;">'+ev.works.map((w,i)=>{const done=deepScores[i]&&deepScores[i][judgeNo];return'<button class="btn '+(done?'btn-green':'btn-yellow')+'" onclick="window.__deepJudgeVoice('+i+','+judgeNo+')" style="height:60px">'+i+1+(done?' ✓':'')+'</button>';}).join("")+'</div><button class="btn btn-ghost btn-sm" style="margin-top:14px" onclick="window.__home()">← 홈</button></div>';}async function deepJudgeVoice(vIdx,judgeNo){STATE.eventId=params.get("ev");STATE.event=await loadEvent(STATE.eventId);const w=STATE.event.works[vIdx];if(!isWritten(w)){toast("미입력");return;}if(!imgCache[vIdx]){imgCache[vIdx]=[];if(w.imgs){w.imgs.forEach((img,i)=>{loadImg(STATE.eventId,vIdx,i+1).then(d=>{if(d)imgCache[vIdx][i]=d;});});}}}function paintDeepJudgeForm(vIdx,judgeNo){const w=STATE.event.works[vIdx];const curImgs=imgCache[vIdx]||[];const deepScores=STATE.event.deepScores||{};myScores=deepScores[vIdx]&&deepScores[vIdx][judgeNo]?{...deepScores[vIdx][judgeNo]}:{};screen.innerHTML='<div class="card"><div class="judge-imgs">'+curImgs.map(img=>'<img class="judge-img" src="'+img+'">').join("")+'</div><h2 style="text-align:center">'+esc(w.title||"제목")+'</h2><div class="crit">'+getCriteria().map(c=>'<div class="crit-row"><div class="crit-head"><span class="crit-name">'+c.name+'</span><span class="crit-val" id="v_'+c.key+'">-<b>/10</b></span></div><div class="scale" data-key="'+c.key+'">'+Array.from({length:10},(_,i)=>'<button data-v="'+(i+1)+'" onclick="window.__pick(\''+c.key+"',"+i+1+')">'+i+1+'</button>').join("")+'</div></div>').join("")+'</div><div class="btn-row"><button class="btn btn-ghost" onclick="window.__deepJudgeHome('+judgeNo+')">← 돌아가기</button><button class="btn btn-green" onclick="window.__submitDeepScore('+vIdx+','+judgeNo+')">제출 ✓</button></div></div>';Object.keys(myScores).forEach(k=>pick(k,myScores[k],true));}function deepJudgeHome(judgeNo){renderDeepJudgeHome(judgeNo);}async function submitDeepScore(vIdx,judgeNo){for(const c of getCriteria()){if(!myScores[c.key])return toast("미선택");}showLoad(true);try{const ev=await loadEvent(STATE.eventId);const deepScores=ev.deepScores||{};if(!deepScores[vIdx])deepScores[vIdx]={};deepScores[vIdx][judgeNo]={...myScores,t:Date.now()};await evRef(STATE.eventId).update({deepScores});showLoad(false);toast("제출됨 ✓");renderDeepJudgeHome(judgeNo);}catch(e){showLoad(false);toast("실패");}}async function goResult(){showLoad(true);STATE.event=await loadEvent(STATE.eventId);const ev=STATE.event;imgCache=await loadAllImgs(STATE.eventId,ev.totalWorks);showLoad(false);const rows=[];ev.works.forEach((w,i)=>{if(!isWritten(w))return;let total=0,judged=0;const allScores={...(ev.scores&&ev.scores[i]||{}),...(ev.deepScores&&ev.deepScores[i]||{})};Object.values(allScores).forEach(js=>{judged++;getCriteria().forEach(c=>total+=(js[c.key]||0));});rows.push({i,w,total,judged});});rows.sort((a,b)=>b.total-a.total);$("#evTag").classList.remove("hidden");const medal=r=>r===0?'m1':r===1?'m2':r===2?'m3':'mx';const cls=r=>r===0?'top1':r===1?'top2':r===2?'top3':'';const rowHtml=(r,rk)=>'<div class="rank '+cls(rk)+'"><div class="medal '+medal(rk)+'">'+(rk<3?['🥇','🥈','🥉'][rk]:rk+1)+'</div><div class="rank-imgs">'+(imgCache[r.i]||[]).map(img=>'<img src="'+img+'">').join("")+'</div><div class="rank-info"><div class="nm">'+esc(r.w.title||"Voice "+(r.i+1))+'</div><div class="who">'+esc(r.w.author||"미입력")+'</div></div><div class="rank-score">'+r.total+'<small>'+r.judged+'명</small></div></div>';const top=rows.slice(0,5).map((r,i)=>rowHtml(r,i)).join("");const rest=rows.slice(5);screen.innerHTML='<div class="card"><h1>🏆 최종 순위</h1>'+top+(rest.length?'<button class="btn btn-ghost" id="moreBtn" style="margin-top:8px" onclick="document.getElementById(\'restBox\').classList.toggle(\'hidden\');this.textContent=document.getElementById(\'restBox\').classList.contains(\'hidden\')?\'6위 보기 ▾\':\'접기 ▴\'">6위 보기 ▾</button><div id="restBox" class="hidden" style="margin-top:12px">'+rest.map((r,i)=>rowHtml(r,i+5)).join("")+'</div>':'')+'<div class="btn-row"><button class="btn btn-ghost" onclick="window.__hub()">허브</button><button class="btn btn-green" onclick="window.__home()">홈</button></div></div>';}let adminUnlocked=false;function adminGate(){if(!guardFb())return;if(adminUnlocked){adminPanel();return;}screen.innerHTML='<div class="card"><h1>관리자</h1><label class="fl">비밀번호</label><input type="password" id="masterPw"><div class="btn-row"><button class="btn btn-ghost" onclick="window.__home()">뒤로</button><button class="btn btn-dark" onclick="window.__adminUnlock()">입장</button></div></div>';}function adminUnlock(){const pw=$("#masterPw").value;if(pw!==_master())return toast("틀림");adminUnlocked=true;adminPanel();}async function adminPanel(){$("#evTag").classList.add("hidden");showLoad(true);let items=[];try{const snap=await db.collection("events").get();snap.forEach(d=>{const v=d.data();items.push({id:d.id,name:v.name,n:v.totalWorks});});}catch(e){}showLoad(false);items.reverse();screen.innerHTML='<div class="card"><h1>전체 이벤트</h1><p class="sub">총 '+items.length+'개</p>'+(items.length?items.map(it=>'<div class="rank" style="border-color:var(--line)"><div class="rank-info"><div class="nm">'+esc(it.name)+'</div><div class="who">'+it.id+' · '+it.n+'개</div></div><button class="btn btn-red btn-sm" onclick="window.__adminDelete(\''+it.id+'\',\''+esc(it.name).replace(/'/g,"")+'\')">삭제</button></div>').join(''):'<p class="sub">없음</p>')+'<button class="btn btn-ghost" style="margin-top:14px" onclick="window.__home()">← 홈</button></div>';}async function adminDelete(id,name){if(!confirm("삭제할까?"))return;showLoad(true);try{await evRef(id).delete();showLoad(false);toast("삭제됨");adminPanel();}catch(e){showLoad(false);}}window.__home=renderHome;window.__newEvent=newEventForm;window.__buildCritInputs=buildCritInputs;window.__createEvent=createEvent;window.__openEvent=openEventForm;window.__doOpen=doOpen;window.__hub=enterHub;window.__goInput=goInput;window.__saveWork=saveWork;window.__inputMove=inputMove;window.__handleImg=handleImg;window.__handlePaste=handlePaste;window.__handleDrop=handleDrop;window.__goJudge=goJudge;window.__goInstantJudge=goInstantJudge;window.__startInstantJudge=startInstantJudge;window.__hostInstantScreen=hostInstantScreen;window.__hostInstantMove=hostInstantMove;window.__finishInstantJudge=finishInstantJudge;window.__startInstantJudgeWatch=startInstantJudgeWatch;window.__pick=pick;window.__submitScore=submitScore;window.__editScore=editScore;window.__goDeepJudge=goDeepJudge;window.__startDeepJudge=startDeepJudge;window.__hostDeepDashboard=hostDeepDashboard;window.__finishDeepJudge=finishDeepJudge;window.__deepJudgeVoice=deepJudgeVoice;window.__deepJudgeHome=deepJudgeHome;window.__submitDeepScore=submitDeepScore;window.__startDeepJudgeScreen=startDeepJudgeScreen;window.__goResult=goResult;window.__admin=adminGate;window.__adminUnlock=adminUnlock;window.__adminDelete=adminDelete;renderHome();</script>
